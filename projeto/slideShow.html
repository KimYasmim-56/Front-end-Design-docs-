<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Show</title>
    <style>
        .slideshow{
            width: 500px;
            margin: 40px auto;
            margin-top: 200px;
            text-align:center;
        }
        .slideshow img{
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
            aspect-ratio: 4 / 5;
        }
        button{
            margin: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <img src="imagem1.jpg" alt="Slide" id="imagem">

        <br>

        <button onclick="voltarSlide()">Voltar</button>
        <button onclick="proximoSlide()">Próximo</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
