<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            margin: 0;
            padding: 0;
        }
        .scene{
            margin: 80px auto;
            width: 210px;
            position: relative; 
            aspect-ratio: 4 / 5; /*define a proporção entre largura e altura em unidade */
            perspective: 1000px;
        }
        .carousel {
            position: absolute;
            width: 100%;
            height: 100%;
             transform-style: preserve-3d; /*quando este elemento for transformado, preserve a profundidade 3D dos seus filhos */
            animation: rotate 30s infinite linear;
        }
        .carousel img{
            position: absolute;
            left: 0;
            top: 0;
            width: 190px;
            aspect-ratio: 4 / 5;
            border-radius: 10px;
            /* transformação composta 3D que faz duas coisas, em ordem; */
            transform: rotateY(var(--i)) translateZ(280px);
            /* primeiro: roda o elemeno em torno do eixo Y - vertical, com Ângulo vindo de uma variavel CSS: --i; */
            /* segundo: depois da rotação, empurra o elemento 288px 'pra frente' ou 'pra fora da tela' no eixo Z, criando profundidade */
            }
            @keyframes rotate {
                0%{transform: rotateY(360deg);}
                100%{transform: rotateY(0deg);}
            }
    </style>
</head>
<body>
    <div class="scene">
        <div class="carousel">
            <img src="imagem1.jpg" alt="imagem do " style="--i:000deg">
            <img src="imagem2.jpg" alt="imagem do " style="--i:040deg">
            <img src="imagem3.jpg" alt="imagem do " style="--i:080deg">
            <img src="imagem4.jpg" alt="imagem do " style="--i:120deg">
            <img src="imagem5.jpg" alt="imagem do " style="--i:160deg">
            <img src="imagem6.jpg" alt="imagem do " style="--i:200deg">
            <img src="imagem7.jpg" alt="imagem do " style="--i:240deg">
            <img src="imagem8.jpg" alt="imagem do " style="--i:280deg">
            <img src="imagem9.jpg" alt="imagem do " style="--i:320deg">
        </div>
    </div>
</body>
</html>
